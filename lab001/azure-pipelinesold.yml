# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger: none

parameters:
  - name: environment
    type: string
    values:
      - dev
      - staging
    default: dev

stages:
- stage: plan_destroy
  jobs:
  - job: plan_destroy
  pool:
    vmImage: ubuntu-latest
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terrform${{ parameters.environment }}ops/${{ parameters.environment }}'
        commandOptions: '-reconfigure'
        backendAzureRmUseEntraIdForAuthentication: false
        backendServiceArm: 'az-${{ parameters.environment }}ops'
        backendAzureRmResourceGroupName: 'tfbackend'
        backendAzureRmStorageAccountName: 'storage19821983'
        backendAzureRmContainerName: 'tf${{ parameters.environment }}'
        backendAzureRmKey: '${{ parameters.environment }}.terraform.tfstate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terrform${{ parameters.environment }}ops/${{ parameters.environment }}'
        environmentServiceNameAzureRM: 'az-${{ parameters.environment }}ops'

- stage: destroy_env
  jobs:
  - job: destroy
    pool:
      vmImage: ubuntu-latest
      steps:
      - task: TerraformInstaller@1
        inputs:
          terraformVersion: 'latest'
      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(System.DefaultWorkingDirectory)/terrform${{ parameters.environment }}ops/${{ parameters.environment }} '
          commandOptions: '-reconfigure'
          backendAzureRmUseEntraIdForAuthentication: false
          backendServiceArm: 'az-${{ parameters.environment }}ops'
          backendAzureRmResourceGroupName: 'tfbackend'
          backendAzureRmStorageAccountName: 'storage19821983'
          backendAzureRmContainerName: 'tf${{ parameters.environment }}'
          backendAzureRmKey: '${{ parameters.environment }}.terraform.tfstate'
      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'destroy'
          workingDirectory: '$(System.DefaultWorkingDirectory)/terrform${{ parameters.environment }}ops/${{ parameters.environment }}'
          commandOptions: '--auto-approve'
          environmentServiceNameAzureRM: 'az-${{ parameters.environment }}ops'

