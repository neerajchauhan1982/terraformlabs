# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
 branches:
   include:
     - main
     - feature/*
 paths:
   include:
   - terrformdevops/*
   - azure-pipelines.yml
stages:
- stage: validate
  jobs:
  - job: tf_validate
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terrformdevops/dev'
        commandOptions: '-reconfigure'
        backendAzureRmUseEntraIdForAuthentication: false
        backendServiceArm: 'Subscription 1(1)(ec9876a3-fa1f-4980-b053-bca7123aedd5)'
        backendAzureRmResourceGroupName: 'tfbackend'
        backendAzureRmStorageAccountName: 'storage19821983'
        backendAzureRmContainerName: 'tfdev'
        backendAzureRmKey: 'dev.terraform.tfstate'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terrformdevops/dev'
- stage: Dev_deploy
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: terraform_apply_dev
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terrformdevops/dev'
        commandOptions: '-reconfigure'
        backendAzureRmUseEntraIdForAuthentication: false
        backendServiceArm: 'Subscription 1(1)(ec9876a3-fa1f-4980-b053-bca7123aedd5)'
        backendAzureRmResourceGroupName: 'tfbackend'
        backendAzureRmStorageAccountName: 'storage19821983'
        backendAzureRmContainerName: 'tfdev'
        backendAzureRmKey: 'dev.terraform.tfstate'
    
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terrformdevops/dev'
        commandOptions: '--auto-approve'
        environmentServiceNameAzureRM: 'Subscription 1(1)(ec9876a3-fa1f-4980-b053-bca7123aedd5)'


